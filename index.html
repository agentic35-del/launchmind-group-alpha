<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSync — AI-Powered Chrome Extension for Job Seekers</title>
  <style>
    :root {
      --bg: #071023;
      --bg-2: #0b1631;
      --card: rgba(255, 255, 255, 0.08);
      --card-strong: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.14);
      --text: #eef2ff;
      --muted: rgba(238, 242, 255, 0.72);
      --muted-2: rgba(238, 242, 255, 0.58);
      --primary: #7c3aed;
      --primary-2: #2563eb;
      --accent: #22d3ee;
      --success: #34d399;
      --warning: #f59e0b;
      --danger: #fb7185;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --radius-sm: 16px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.32), transparent 30%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.26), transparent 26%),
        radial-gradient(circle at bottom center, rgba(34, 211, 238, 0.14), transparent 28%),
        linear-gradient(180deg, #040814 0%, var(--bg) 36%, #040814 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image:
        linear-gradient(rgba(255,255,255,0.8) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.8) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 55%, transparent 100%);
      z-index: 0;
    }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .topbar {
      padding: 22px 0;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(7, 16, 35, 0.56);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: var(--shadow);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      display: grid;
      place-items: center;
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.35);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.35), transparent 50%);
    }

    .brand-mark span {
      font-size: 18px;
      font-weight: 900;
      z-index: 1;
    }

    .nav-links {
      display: flex;
      gap: 22px;
      color: var(--muted);
      font-size: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-links a:hover { color: #fff; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      box-shadow: 0 16px 32px rgba(37, 99, 235, 0.24);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      border-color: var(--border);
      color: var(--text);
    }

    .hero {
      padding: 72px 0 44px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.14);
      color: #d8c7ff;
      border: 1px solid rgba(124, 58, 237, 0.25);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(3rem, 6vw, 5.5rem);
      line-height: 0.95;
      margin: 0 0 18px;
      letter-spacing: -0.04em;
    }

    .gradient-text {
      background: linear-gradient(135deg, #ffffff 0%, #a78bfa 35%, #60a5fa 75%, #22d3ee 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      font-size: 1.08rem;
      line-height: 1.75;
      color: var(--muted);
      max-width: 62ch;
      margin: 0 0 28px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }

    .hero-metrics {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .metric {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      min-width: 160px;
    }

    .metric strong {
      display: block;
      font-size: 1.15rem;
      margin-bottom: 6px;
    }

    .metric span {
      color: var(--muted-2);
      font-size: 0.92rem;
    }

    .hero-card {
      padding: 22px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: auto -15% -20% auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(34,211,238,0.28), transparent 62%);
      filter: blur(8px);
      pointer-events: none;
    }

    .mini-window {
      background: rgba(5, 10, 24, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
    }

    .mini-window-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #fb7185; }
    .dot.yellow { background: #fbbf24; }
    .dot.green { background: #34d399; }

    .mini-content {
      padding: 18px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .stat-row:last-child { border-bottom: none; }
    .label { color: var(--muted-2); font-size: 0.92rem; }
    .value { font-weight: 700; text-align: right; }

    section {
      padding: 28px 0 10px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.8rem, 2.8vw, 2.8rem);
      letter-spacing: -0.03em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      max-width: 62ch;
      line-height: 1.7;
    }

    .grid-3, .grid-4 {
      display: grid;
      gap: 18px;
    }

    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.22);
      backdrop-filter: blur(14px);
      transition: transform .25s ease, border-color .25s ease, background .25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.22);
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.07));
    }

    .step-num, .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(124,58,237,0.24), rgba(37,99,235,0.24));
      border: 1px solid rgba(255,255,255,0.10);
      margin-bottom: 16px;
      font-weight: 800;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.12rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .feature-icon {
      font-size: 1.1rem;
    }

    .feature-card {
      min-height: 210px;
    }

    .report-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .report-card {
      padding: 24px;
    }

    .report-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .score-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(251, 113, 133, 0.12);
      color: #fecdd3;
      border: 1px solid rgba(251, 113, 133, 0.28);
      font-weight: 800;
    }

    .badge-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .badge {
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .badge.good {
      background: rgba(52, 211, 153, 0.12);
      border-color: rgba(52, 211, 153, 0.24);
      color: #bbf7d0;
    }

    .badge.bad {
      background: rgba(251, 113, 133, 0.12);
      border-color: rgba(251, 113, 133, 0.24);
      color: #fecdd3;
    }

    .badge.neutral {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
      color: var(--text);
    }

    .recommendation {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .rec-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .rec-item strong {
      display: block;
      margin-bottom: 6px;
    }

    .rec-item span {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .testimonials .card {
      min-height: 220px;
    }

    .quote {
      font-size: 1.02rem;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 20px;
    }

    .person {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #7c3aed);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .person small {
      color: var(--muted-2);
      display: block;
      margin-top: 4px;
    }

    footer {
      padding: 36px 0 48px;
      color: var(--muted-2);
    }

    .footer-inner {
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.10);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tiny-note {
      font-size: 0.95rem;
      color: var(--muted);
    }

    @media (max-width: 960px) {
      .hero-grid, .report-wrap, .grid-4, .grid-3 {
        grid-template-columns: 1fr;
      }

      h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); }
      .nav { border-radius: 28px; }
      .nav-links { display: none; }
    }

    @media (max-width: 640px) {
      .hero { padding-top: 44px; }
      .card, .hero-card, .nav { padding-left: 16px; padding-right: 16px; }
      .hero-actions { flex-direction: column; }
      .btn { width: 100%; }
      .metric { width: 100%; }
      .section-head { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header class="topbar">
    <div class="container">
      <nav class="nav" aria-label="Primary">
        <
