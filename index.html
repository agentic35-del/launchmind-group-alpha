<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSync — Chrome Extension for Job Seekers</title>
  <meta name="description" content="SkillSync is a Chrome extension that analyzes job postings and shows job seekers exactly which skills they are missing and how to close those gaps." />
  <style>
    :root{
      --bg: #070B1A;
      --bg2:#0B1230;
      --card:#0F1738cc;
      --card2:#111C44;
      --text:#EAF0FF;
      --muted:#A8B3D9;
      --line: rgba(255,255,255,.10);
      --primary:#7C3AED;
      --primary2:#2563EB;
      --accent:#22D3EE;
      --good:#22C55E;
      --warn:#F59E0B;
      --bad:#FB7185;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 24px;
      --radius-sm: 16px;
      --max: 1180px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(124,58,237,.28), transparent 32%),
        radial-gradient(circle at 80% 0%, rgba(37,99,235,.30), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(34,211,238,.12), transparent 34%),
        linear-gradient(180deg, var(--bg), var(--bg2) 60%, #050816 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    a{color:inherit; text-decoration:none}
    .container{width:min(var(--max), calc(100% - 40px)); margin:0 auto}
    .nav{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(18px);
      background: rgba(7,11,26,.6);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .nav-inner{
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 0;
    }
    .brand{
      display:flex; align-items:center; gap:12px; font-weight:800; letter-spacing:.2px;
    }
    .logo{
      width:42px; height:42px; border-radius:14px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      display:grid; place-items:center;
      box-shadow: 0 10px 30px rgba(37,99,235,.35);
      position:relative;
    }
    .logo:before{
      content:""; position:absolute; inset:10px;
      border:2px solid rgba(255,255,255,.75);
      border-radius:10px;
      transform: rotate(8deg);
    }
    .brand span{font-size:1.05rem}
    .nav-links{
      display:flex; gap:22px; align-items:center;
      color:var(--muted); font-weight:600; font-size:.95rem;
    }
    .nav-links a:hover{color:var(--text)}
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:10px;
      border:none; cursor:pointer;
      padding:14px 20px;
      border-radius:999px;
      font-weight:800;
      color:white;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      box-shadow: 0 18px 40px rgba(124,58,237,.28);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }
    .btn:hover{transform: translateY(-2px); box-shadow: 0 22px 48px rgba(37,99,235,.35); filter:saturate(1.05)}
    .btn.secondary{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:none;
      color:var(--text);
    }

    .hero{
      padding:72px 0 46px;
      position:relative;
    }
    .hero-grid{
      display:grid;
      grid-template-columns: 1.08fr .92fr;
      gap:34px;
      align-items:center;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      border-radius:999px;
      color:#D7E0FF;
      font-size:.92rem;
      font-weight:700;
      margin-bottom:18px;
    }
    .eyebrow .dot{
      width:9px; height:9px; border-radius:50%;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      box-shadow: 0 0 0 6px rgba(34,211,238,.12);
    }
    h1{
      margin:0 0 18px;
      font-size: clamp(2.5rem, 5vw, 5rem);
      line-height: .96;
      letter-spacing:-.04em;
    }
    .gradient-text{
      background: linear-gradient(135deg, #FFFFFF 0%, #B9C7FF 30%, #8EDBFF 60%, #A78BFA 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .lead{
      font-size:1.1rem;
      line-height:1.8;
      color:var(--muted);
      max-width:58ch;
      margin:0 0 28px;
    }
    .cta-row{display:flex; gap:14px; flex-wrap:wrap; align-items:center}
    .trust{
      display:flex; gap:18px; flex-wrap:wrap;
      margin-top:28px; color:#C9D4FF; font-size:.94rem;
    }
    .trust-item{
      display:flex; align-items:center; gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
    }

    .hero-card{
      background: linear-gradient(180deg, rgba(17,28,68,.85), rgba(15,23,56,.72));
      border:1px solid rgba(255,255,255,.10);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero-card:before{
      content:"";
      position:absolute; inset:-80px -80px auto auto;
      width:240px; height:240px;
      background: radial-gradient(circle, rgba(34,211,238,.24), transparent 65%);
      filter: blur(10px);
    }
    .mock-header{
      display:flex; gap:8px; padding:18px 18px 0;
    }
    .win-dot{width:12px; height:12px; border-radius:50%}
    .w1{background:#FF5F57}.w2{background:#FEBC2E}.w3{background:#28C840}
    .mock-body{padding:18px}
    .mini-top{
      display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:18px;
    }
    .job-title{font-size:1.08rem; font-weight:800; margin:0 0 4px}
    .company{color:var(--muted); font-size:.95rem}
    .score-ring{
      width:110px; height:110px; border-radius:50%;
      background:
        conic-gradient(var(--primary2) 0deg, var(--primary) 144deg, rgba(255,255,255,.08) 144deg 360deg);
      display:grid; place-items:center;
      box-shadow: inset 0 0 0 12px rgba(255,255,255,.03);
      flex:0 0 auto;
    }
    .score-ring > div{
      width:78px; height:78px; border-radius:50%;
      background:#0B1230;
      display:grid; place-items:center;
      text-align:center;
    }
    .score-num{font-size:1.45rem; font-weight:900; line-height:1}
    .score-label{font-size:.7rem; color:var(--muted); margin-top:2px}

    .stat-row{
      display:grid; grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:14px;
    }
    .stat{
      padding:14px;
      border-radius:18px;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .stat h4{margin:0 0 8px; font-size:.88rem; color:#DCE4FF}
    .badges{display:flex; flex-wrap:wrap; gap:8px}
    .badge{
      padding:8px 10px;
      border-radius:999px;
      font-size:.84rem;
      font-weight:700;
      border:1px solid transparent;
    }
    .badge.good{background: rgba(34,197,94,.12); color:#A7F3D0; border-color: rgba(34,197,94,.22)}
    .badge.missing{background: rgba(251,113,133,.12); color:#FBCFE8; border-color: rgba(251,113,133,.22)}
    .badge.reco{background: rgba(37,99,235,.12); color:#BFDBFE; border-color: rgba(37,99,235,.22)}
    .section{padding:78px 0}
    .section h2{
      font-size: clamp(1.7rem, 3vw, 2.7rem);
      margin:0 0 14px;
      letter-spacing:-.03em;
    }
    .section p.section-lead{
      color:var(--muted);
      margin:0 0 28px;
      max-width:72ch;
      line-height:1.8;
    }
    .cards{
      display:grid;
      gap:18px;
      grid-template-columns: repeat(4, 1fr);
    }
    .card{
      background: linear-gradient(180deg, rgba(17,28,68,.82), rgba(15,23,56,.72));
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding:24px;
      box-shadow: var(--shadow);
    }
    .icon{
      width:54px; height:54px; border-radius:18px;
      background: linear-gradient(135deg, rgba(124,58,237,.2), rgba(37,99,235,.16));
      border:1px solid rgba(255,255,255,.08);
      display:grid; place-items:center;
      margin-bottom:18px;
      font-size:1.35rem;
    }
    .card h3{margin:0 0 10px; font-size:1.08rem}
    .card p{margin:0; color:var(--muted); line-height:1.7; font-size:.96rem}

    .steps{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:18px;
    }
    .step{
      position:relative;
      padding:26px;
      overflow:hidden;
    }
    .step-num{
      width:42px; height:42px; border-radius:14px;
      display:grid; place-items:center;
      font-weight:900;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      margin-bottom:16px;
    }
    .step:after{
      content:"";
      position:absolute; inset:auto -40px -60px auto;
      width:160px; height:160px; border-radius:50%;
      background: radial-gradient(circle, rgba(124,58,237,.18), transparent 68%);
    }

    .gap-wrap{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:18px;
      align-items:start;
    }
    .report{
      padding:28px;
    }
    .report-top{
      display:flex; justify-content:space-between; gap:20px; align-items:center; flex-wrap:wrap;
      margin-bottom:20px;
    }
    .report-title{margin:0; font-size:1.35rem}
    .match{
      display:flex; flex-direction:column; align-items:flex-end;
      min-width:120px;
    }
    .match strong{font-size:2.3rem; line-height:1}
    .match span{color:var(--muted); font-size:.9rem}
    .report-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }
    .report-box{
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:18px;
    }
    .report-box h4{margin:0 0 12px; font-size:.98rem}
    .list{display:flex; flex-wrap:wrap; gap:10px}
    .list .badge{font-size:.88rem; padding:9px 12px}
    .recommendations{
      display:grid;
      gap:12px;
    }
    .rec-item{
      display:flex; justify-content:space-between; gap:12px; align-items:flex-start;
      padding:14px 16px;
      border-radius:16px;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .rec-item strong{display:block; margin-bottom:3px}
    .rec-item small{color:var(--muted)}
    .source{
      padding:8px 10px; border-radius:999px;
      background: rgba(34,211,238,.11);
      color:#CFFAFE;
      border:1px solid rgba(34,211,238,.18);
      font-size:.8rem; font-weight:700;
      white-space:nowrap;
    }

    .testimonials{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:18px;
    }
    .quote{
      position:relative;
      padding:28px;
    }
    .quote:before{
      content:"“";
      position:absolute; top:-12px; left:18px;
      font-size:5rem; line-height:1;
      color:rgba(167,139,250,.25);
      font-family: Georgia, serif;
    }
    .quote p{margin:18px 0 20px; color:#D6DEFF; line-height:1.8}
    .person{
      display:flex; align-items:center; gap:12px;
    }
    .avatar{
      width:46px; height:46px; border-radius:50%;
      background: linear-gradient(135deg, #A78BFA, #22D3EE);
      display:grid; place-items:center;
      font-weight:900;
      color:#07101f;
    }
    .person strong{display:block}
    .person span{display:block; color:var(--muted); font-size:.9rem}

    .footer{
      padding:34px 0 50px;
      color:var(--muted);
      border-top:1px solid rgba(255,255,255,.07);
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.02));
    }
    .footer-inner{display:flex; justify-content:space-between; gap:18px; flex-wrap:wrap; align-items:center}
    .footer small{font-size:.95rem}

    @media (max-width: 980px){
      .hero-grid, .gap-wrap, .cards, .steps, .testimonials{grid-template-columns:1fr}
      .nav-links{display:none}
      .hero{padding-top:42px}
      .stat-row{grid-template-columns:1fr}
      .match{align-items:flex-start}
    }
    @media (max-width: 560px){
      .container{width:min(var(--max), calc(100% - 28px))}
      .btn{width:100%}
      .cta-row{display:grid; grid-template-columns:1fr}
      h1{font-size:2.45rem}
      .card,.report,.quote{padding:22px}
      .mini-top{flex-direction:column; align-items:flex-start}
      .score-ring{width:96px; height:96px}
      .score-ring > div{width:68px; height:68px}
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="#" class="brand" aria-label="SkillSync Home">
        <div class="logo" aria-hidden="true"></div>
        <span>SkillSync</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="#how-it-works">How It Works</a>
        <a href="#features">Features</a>
